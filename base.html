<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Smart Job Portal{% endblock %} | PlacementPro</title>
  <meta name="description" content="{% block meta_desc %}Smart Job Portal - Connecting students, companies and opportunities{% endblock %}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  {% block extra_css %}{% endblock %}
  <style>
    /* Inline fallback for icons if CDN fails */
    .bi::before { font-family: "bootstrap-icons" !important; }
  </style>
</head>
<body>
  {% block body %}{% endblock %}
  <script>
    // Auto-dismiss flash messages
    setTimeout(() => {
      document.querySelectorAll('.flash').forEach(el => {
        el.style.opacity = '0';
        el.style.transition = 'opacity 0.5s';
        setTimeout(() => el.remove(), 500);
      });
    }, 4000);
  </script>
  {% block extra_js %}{% endblock %}
</body>
</html>
